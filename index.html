<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stone Care</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <div class="container nav">
        <img src="images/logo.png" class="logo">
        <button class="order-btn" onclick="orderNow()">Order Now</button>
    </div>
</header>

<section class="hero">
    <h1>
        ⚠️ यदि <span>अल्ट्रासाउन्ड रिपोर्टमा पत्थरी देखियो</span> भने <br>
        र डाक्टरले <span>शल्यक्रिया सुझाव दिन्छन्</span> भने -
    </h1>
</section>

<section class="products">
    <img src="images/product1.png">
    <img src="images/product2.png">
</section>

<section class="pricing">
    <div class="price-box">
        <span class="old">₹7000</span>
        <span class="new">₹4000</span>
        <p>Limited Offer</p>
        <button onclick="orderNow()">Order Now</button>
    </div>
</section>

<!-- VIDEO SLIDER -->
<section class="testimonials">
    <h2>Customer Reviews</h2>

    <div class="slider" id="slider">
        <div class="track">

            <div class="slide"><video src="videos/video1.mp4" controls></video></div>
            <div class="slide active"><video src="videos/video2.mp4" controls></video></div>
            <div class="slide"><video src="videos/video3.mp4" controls></video></div>

        </div>
    </div>
</section>

<section class="disclaimer">
    Disclaimer: Results may vary. Consult doctor before use.
</section>

<script src="script.js"></script>

</body>
</html>
